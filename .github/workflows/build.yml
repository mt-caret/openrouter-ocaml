name: build & run tests

on:
  - push
  - pull_request

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Set up dune
        uses: ocaml-dune/setup-dune@v2

      - run: dune tool install ocamlformat

      - run: dune fmt
