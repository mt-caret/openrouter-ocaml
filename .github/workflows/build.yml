name: build & run tests

on:
  - push
  - pull_request

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Set up dune
        uses: ocaml-dune/setup-dune@65aa18d6018a611f8ec2b3229091f4b6cd1d17de
        with:
          version: 3.23.1
          steps: install-dune enable-pkg lazy-update-depexts install-gpatch install-depexts build-deps

      - run: dune tool install ocamlformat

      - run: dune build

      - run: dune runtest

      - run: dune fmt
